<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Ash Mofidi · Command Center</title>
<meta name="theme-color" content="#f1ecdd" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg?v=ash2" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=ash2" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=ash2" />
<link rel="shortcut icon" href="/favicon.svg?v=ash2" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --bg: #f1ecdd;
    --bg-soft: #e8e2d0;
    --bg-card: #f6f1e3;
    --ink: #0e0e0e;
    --ink-dim: #525252;
    --ink-faint: #969696;
    --persimmon: #001dd9;
    --persimmon-soft: #1c3fe8;
    --sage: #1b7a42;
    --green: #1b7a42;
    --amber: #b88a3a;
    --red: #a8243b;
    --line: rgba(14,14,14,0.1);
    --line-strong: rgba(14,14,14,0.2);
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  html, body { margin:0; padding:0; background: var(--bg); color: var(--ink); }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    font-weight: 300;
    letter-spacing: -0.01em;
    min-height: 100vh;
  }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--persimmon); color: var(--bg); }

  .ambient { position: fixed; inset:0; pointer-events:none; z-index:0;
    background: radial-gradient(ellipse 60% 40% at 50% -10%, rgba(0,29,217,0.05), transparent 55%); }
  .grain { position: fixed; inset:0; pointer-events:none; z-index:1; opacity:0.04; mix-blend-mode:overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>"); }

  header {
    position: relative; z-index: 5;
    display: flex; justify-content: space-between; align-items: center;
    padding: 24px 40px;
    border-bottom: 1px solid var(--line);
    font-size: 13px; color: var(--ink-dim);
    background: rgba(241,236,221,0.85);
    backdrop-filter: blur(10px);
    position: sticky; top: 0;
  }
  .mark { display:flex; align-items:center; gap:12px;
    font-family:'Fraunces',serif; font-weight:500; font-size:17px; color:var(--ink); letter-spacing:-0.02em; }
  .mark-logo { width:28px; height:28px; display:block; flex-shrink:0; }
  .mark-logo svg { width:100%; height:100%; display:block; }
  .mark-dot { width:8px; height:8px; border-radius:50%; background:var(--persimmon);
    box-shadow:0 0 10px rgba(0,29,217,0.7); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.25)} }
  .mark small { font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:400;
    letter-spacing:0.18em; text-transform:uppercase; color:var(--ink-dim); margin-left:12px; }
  .header-right { display:flex; align-items:center; gap:16px; }
  .live {
    display:inline-flex; align-items:center; gap:8px;
    padding:6px 12px; border-radius:999px; border:1px solid var(--line);
    font-family:'JetBrains Mono',monospace; font-size:11px;
    letter-spacing:0.12em; text-transform:uppercase; color:var(--ink-dim);
  }
  .live-dot { width:6px; height:6px; border-radius:50%; background:var(--green);
    box-shadow:0 0 10px rgba(27,122,66,0.6); animation: breathe 2.4s ease-in-out infinite; }
  @keyframes breathe { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .logout-btn {
    background:transparent; color:var(--ink-dim); border:1px solid var(--line);
    padding:6px 12px; border-radius:8px; font-family:inherit; font-size:12px;
    cursor:pointer; transition: all 0.2s;
  }
  .logout-btn:hover { color:var(--persimmon); border-color:var(--persimmon); }

  .wrap { max-width:1280px; margin:0 auto; padding:40px; position:relative; z-index:3; }

  h1 {
    font-family:'Fraunces',serif; font-weight:300;
    font-size: clamp(36px, 5vw, 54px); line-height:1; letter-spacing:-0.035em;
    margin:0 0 8px;
    font-variation-settings: "opsz" 144;
  }
  h1 em { font-style:italic; color:var(--persimmon); }
  .page-sub { color:var(--ink-dim); font-size:15px; margin-bottom:40px; }
  .page-sub b { color:var(--ink); font-weight:400; }

  /* ========================================================================
     CEO DASHBOARD · world-class analytics layout
     Tier 1: hero metric (one number that matters most, above the fold)
     Tier 2: pulse row (today vs yesterday context)
     Tier 3: 30-day growth chart (story-level view)
     Tier 4: insight panels (what resonates / where they come from)
     Tier 5: live feed (stories, not rows of IDs)
     Tier 6: performance (deep links, refusal signals, export)
     ======================================================================== */

  /* TIER 1: Hero metric */
  .hero-stat {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 48px;
    padding: 48px 44px;
    background: linear-gradient(180deg, rgba(0,29,217,0.05), rgba(0,29,217,0.01));
    border: 1px solid rgba(0,29,217,0.18);
    border-radius: 22px;
    margin-bottom: 32px;
    align-items: center;
  }
  .hero-stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--persimmon); font-weight: 500;
    margin-bottom: 14px;
    display: inline-flex; align-items: center; gap: 10px;
  }
  .hero-stat-label::before {
    content: ""; width: 28px; height: 1px; background: var(--persimmon); opacity: 0.7;
  }
  .hero-stat-number {
    font-family: 'Fraunces', serif;
    font-size: clamp(80px, 11vw, 144px);
    line-height: 0.9; font-weight: 300;
    font-variation-settings: "opsz" 144;
    color: var(--persimmon);
    letter-spacing: -0.055em;
    margin: 0;
  }
  .hero-stat-caption {
    margin-top: 18px;
    font-family: 'Fraunces', serif; font-style: italic; font-weight: 300;
    font-size: 20px; color: var(--ink-2);
    line-height: 1.4; letter-spacing: -0.015em;
    max-width: 520px;
  }
  .hero-stat-caption b { color: var(--ink); font-weight: 500; font-style: normal; }
  .hero-stat-trend {
    display: flex; flex-direction: column; gap: 16px;
    padding-left: 32px; border-left: 1px solid var(--line);
  }
  .hero-wow { display: flex; align-items: baseline; gap: 10px; }
  .hero-wow-num {
    font-family: 'Fraunces', serif; font-weight: 400;
    font-size: 36px; line-height: 1; letter-spacing: -0.025em;
  }
  .hero-wow-num.up { color: var(--sage); }
  .hero-wow-num.down { color: var(--red); }
  .hero-wow-num.flat { color: var(--ink-dim); }
  .hero-wow-label {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-dim);
  }
  .hero-spark { height: 56px; width: 100%; }
  .hero-spark path { fill: none; stroke: var(--persimmon); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .hero-spark .area { fill: rgba(0,29,217,0.08); stroke: none; }

  /* TIER 2: Pulse row (4 compact cards, today-facing) */
  .pulse {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 32px;
  }
  .pulse-card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 22px 22px 18px;
    transition: border-color 0.2s;
  }
  .pulse-card:hover { border-color: var(--line-strong); }
  .pulse-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-dim); margin-bottom: 14px; font-weight: 500;
  }
  .pulse-value {
    font-family: 'Fraunces', serif;
    font-weight: 400; font-size: 38px; line-height: 1;
    letter-spacing: -0.03em; color: var(--ink);
    font-variation-settings: "opsz" 144;
  }
  .pulse-value.text {
    font-size: 22px; font-style: italic; font-weight: 400;
    color: var(--persimmon);
  }
  .pulse-delta {
    margin-top: 10px; font-size: 12px;
    color: var(--ink-dim);
    line-height: 1.4;
  }
  .pulse-delta .arrow-up { color: var(--sage); margin-right: 4px; }
  .pulse-delta .arrow-down { color: var(--red); margin-right: 4px; }

  /* TIER 3: Growth chart panel */
  .chart-panel {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 32px 36px 24px;
    margin-bottom: 32px;
  }
  .chart-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 24px; flex-wrap: wrap; gap: 16px;
  }
  .chart-title {
    font-family: 'Fraunces', serif; font-weight: 400;
    font-size: 24px; letter-spacing: -0.02em;
  }
  .chart-title em { font-style: italic; color: var(--persimmon); }
  .chart-legend { display: flex; gap: 20px; font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--ink-dim); letter-spacing: 0.08em; text-transform: uppercase; }
  .chart-legend span { display: inline-flex; align-items: center; gap: 8px; }
  .chart-legend span::before {
    content: ""; width: 12px; height: 2px; border-radius: 1px;
  }
  .chart-legend .leg-q::before { background: var(--persimmon); }
  .chart-legend .leg-v::before { background: var(--sage); }
  .chart-wrap { height: 280px; position: relative; }
  svg.chart { width: 100%; height: 100%; display: block; overflow: visible; }
  .chart-axis-label {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    fill: var(--ink-faint); letter-spacing: 0.08em;
  }
  .chart-line-q { fill: none; stroke: var(--persimmon); stroke-width: 2.5; stroke-linecap: round; }
  .chart-line-v { fill: none; stroke: var(--sage); stroke-width: 2; stroke-dasharray: 4 4; stroke-linecap: round; }
  .chart-area-q { fill: rgba(0,29,217,0.08); stroke: none; }
  .chart-dot { fill: var(--persimmon); stroke: var(--bg-card); stroke-width: 2; }

  /* TIER 4: Insight grid (2-col) */
  .insight-grid {
    display: grid; grid-template-columns: 1.2fr 1fr;
    gap: 20px;
    margin-bottom: 32px;
  }
  .insight-card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 28px 30px;
  }
  .insight-head { margin-bottom: 22px; }
  .insight-title {
    font-family: 'Fraunces', serif; font-weight: 400;
    font-size: 22px; letter-spacing: -0.02em; margin: 0;
  }
  .insight-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ink-dim); margin-top: 6px;
  }

  /* Top-list (reused for themes + referrers) */
  .top-list { display: flex; flex-direction: column; gap: 12px; }
  .top-item { display: flex; align-items: center; gap: 14px; }
  .top-name {
    flex: 0 0 140px;
    font-family: 'Inter', sans-serif; font-size: 14px;
    color: var(--ink); font-weight: 400;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .top-bar-track {
    flex: 1; height: 6px; background: var(--bg-soft);
    border-radius: 3px; overflow: hidden;
  }
  .top-bar-fill {
    height: 100%; background: linear-gradient(90deg, var(--persimmon), var(--persimmon-soft));
    border-radius: 3px; transition: width 0.8s cubic-bezier(.2,.8,.2,1);
  }
  .top-num {
    font-family: 'Fraunces', serif; font-size: 18px; font-weight: 400;
    color: var(--persimmon); min-width: 36px; text-align: right;
    letter-spacing: -0.01em;
  }

  /* TIER 5: Live feed (stories, not hashes) */
  .feed-panel {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 28px 32px;
    margin-bottom: 32px;
  }
  .feed-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 20px;
  }
  .feed-title {
    font-family: 'Fraunces', serif; font-weight: 400;
    font-size: 22px; letter-spacing: -0.02em;
  }
  .feed-title em { font-style: italic; color: var(--persimmon); }
  .feed-pulse {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-dim);
  }
  .feed-pulse::before {
    content: ""; width: 7px; height: 7px; border-radius: 50%;
    background: var(--sage); box-shadow: 0 0 10px rgba(27,122,66,0.6);
    animation: feedPulse 2.4s ease-in-out infinite;
  }
  @keyframes feedPulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .feed { display: flex; flex-direction: column; }
  .feed-item {
    display: grid; grid-template-columns: 88px 32px 1fr;
    gap: 16px; align-items: start;
    padding: 16px 0;
    border-bottom: 1px dashed var(--line);
  }
  .feed-item:last-child { border-bottom: none; }
  .feed-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.06em;
    color: var(--ink-faint);
    padding-top: 4px;
  }
  .feed-icon {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 600;
    flex-shrink: 0;
  }
  .feed-icon.ask { background: rgba(0,29,217,0.1); color: var(--persimmon); }
  .feed-icon.visit { background: rgba(27,122,66,0.1); color: var(--sage); }
  .feed-icon.refused { background: rgba(168,36,59,0.1); color: var(--red); }
  .feed-body {
    font-size: 14.5px; color: var(--ink-2);
    line-height: 1.5; padding-top: 4px;
  }
  .feed-body b { color: var(--ink); font-weight: 500; }
  .feed-body i {
    font-family: 'Fraunces', serif; font-style: italic;
    color: var(--ink); font-weight: 400; font-size: 15.5px;
  }
  .feed-body .tag {
    display: inline-block; margin-left: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ink-faint);
  }

  /* TIER 6: Footer row (deep-link performance + refusal + export) */
  .footer-grid {
    display: grid; grid-template-columns: 1.5fr 1fr 1fr;
    gap: 20px; margin-bottom: 32px;
  }
  .footer-card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 24px 28px;
  }
  .footer-card h3 {
    font-family: 'Fraunces', serif; font-weight: 400;
    font-size: 18px; letter-spacing: -0.015em;
    margin: 0 0 16px;
  }
  .footer-card h3 em { font-style: italic; color: var(--persimmon); }
  .deeplink-list { font-family: 'JetBrains Mono', monospace; font-size: 12px;
    line-height: 2.1; color: var(--ink-dim); }
  .deeplink-list a { color: var(--persimmon); letter-spacing: 0.06em; }
  .deeplink-list a:hover { text-decoration: underline; }
  .deeplink-list .count {
    display: inline-block; margin-left: 10px;
    padding: 1px 8px; border-radius: 4px;
    background: rgba(0,29,217,0.08); color: var(--persimmon);
    font-size: 10px; letter-spacing: 0.1em;
  }
  .kpi-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 10px 0; border-bottom: 1px solid var(--line);
  }
  .kpi-row:last-child { border-bottom: none; }
  .kpi-row .k { font-size: 13px; color: var(--ink-dim); }
  .kpi-row .v {
    font-family: 'Fraunces', serif; font-size: 22px; font-weight: 400;
    color: var(--ink); letter-spacing: -0.02em;
  }
  .kpi-row .v.red { color: var(--red); }
  .kpi-row .v.green { color: var(--sage); }
  .kpi-row .v.blue { color: var(--persimmon); }

  .empty {
    text-align: center; padding: 32px 20px;
    color: var(--ink-faint); font-size: 13.5px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.02em; line-height: 1.6;
  }

  .export-btn {
    background: transparent; color: var(--persimmon);
    border: 1px solid var(--persimmon);
    padding: 9px 16px; border-radius: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s; font-weight: 500;
  }
  .export-btn:hover { background: rgba(0,29,217,0.1); }

  .section-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-dim); margin: 0 0 14px; font-weight: 500;
  }
  .section-title::before {
    content: ""; display: inline-block;
    width: 22px; height: 1px; background: var(--ink-dim);
    margin-right: 10px; vertical-align: middle;
  }

  /* login screen */
  .login-wrap {
    min-height: 100vh; display:flex; align-items:center; justify-content:center;
    padding: 40px; position:relative; z-index:3;
  }
  .login-card {
    max-width: 440px; width:100%;
    background: var(--bg-card); border:1px solid var(--line-strong); border-radius:20px;
    padding: 44px 40px; text-align:center;
    box-shadow: 0 30px 80px -30px rgba(0,0,0,0.6);
  }
  .login-card h1 { font-size: 32px; margin:0 0 8px; }
  .login-card p { color: var(--ink-dim); font-size:14px; margin: 0 0 32px; line-height:1.5; }
  .login-google-holder { display:flex; justify-content:center; margin-bottom:16px; }
  .login-note { font-size:11px; color:var(--ink-faint); font-family:'JetBrains Mono',monospace;
    letter-spacing:0.08em; margin-top:20px; line-height:1.6; }
  .login-note code { background: var(--bg-soft); padding: 1px 6px; border-radius:4px; color:var(--persimmon); }
  .login-or {
    display: flex; align-items: center; gap: 12px;
    margin: 18px 0; color: var(--ink-faint);
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.2em; text-transform: uppercase;
  }
  .login-or::before, .login-or::after {
    content: ""; flex: 1; height: 1px; background: var(--line);
  }
  .pw-form {
    display: flex; gap: 8px; margin-top: 4px;
  }
  .pw-form input {
    flex: 1; background: var(--bg-soft); border: 1px solid var(--line-strong);
    color: var(--ink); padding: 12px 14px; border-radius: 10px;
    font-family: inherit; font-size: 14px; outline: none;
    transition: border-color 0.2s;
  }
  .pw-form input:focus { border-color: var(--persimmon); }
  .pw-btn {
    background: var(--persimmon); color: var(--bg); border: none;
    padding: 12px 20px; border-radius: 10px;
    font-family: inherit; font-weight: 500; font-size: 13px;
    cursor: pointer; transition: background 0.2s;
  }
  .pw-btn:hover { background: var(--persimmon-soft); }
  .login-error {
    background: rgba(168,36,59,0.08); border: 1px solid rgba(168,36,59,0.3); color: var(--red);
    padding: 12px 16px; border-radius:10px; font-size:13px; margin-bottom:24px;
  }

  .kv-warn {
    background: rgba(184,138,58,0.08); border:1px solid rgba(184,138,58,0.25);
    border-radius:12px; padding: 18px 22px; margin-bottom:32px;
    font-size:13px; line-height:1.55; color:var(--ink);
  }
  .kv-warn b { color:var(--amber); }
  .kv-warn code { background: var(--bg-soft); padding: 1px 6px; border-radius:4px; font-family:'JetBrains Mono',monospace; font-size:12px; }

  footer { padding: 40px; text-align:center; color:var(--ink-faint); font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.15em; text-transform:uppercase; }

  @media (max-width: 960px) {
    .hero-stat { grid-template-columns: 1fr; gap: 24px; padding: 32px 24px; }
    .hero-stat-trend { padding-left: 0; border-left: none; border-top: 1px solid var(--line); padding-top: 24px; }
    .pulse { grid-template-columns: repeat(2, 1fr); }
    .insight-grid, .footer-grid { grid-template-columns: 1fr; }
    header, .wrap { padding: 20px; }
    .hero-stat-number { font-size: 80px; }
  }
</style>
</head>
<body>
<div class="ambient"></div>
<div class="grain"></div>

<div id="app"></div>

<script>
  const GSI_CLIENT_ID_FETCH = () => fetch('/api/auth?action=config').then(r=>r.json()).catch(()=>({}));

  async function getSession() {
    try { const r = await fetch('/api/auth?action=me'); return await r.json(); } catch { return { admin: false }; }
  }

  async function loginWithCredential(credential) {
    const r = await fetch('/api/auth?action=login', {
      method: 'POST',
      headers: {'content-type':'application/json'},
      body: JSON.stringify({ credential })
    });
    return r.json().then(j => ({ status: r.status, body: j }));
  }

  async function logout() {
    await fetch('/api/auth?action=logout', { method: 'POST' });
    location.reload();
  }

  async function loginWithPassword(password) {
    const r = await fetch('/api/auth?action=password', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ password })
    });
    return r.json().then(j => ({ status: r.status, body: j }));
  }

  function renderLogin(err, missing) {
    const clientId = window.__GOOGLE_CLIENT_ID || '';
    const passwordAvailable = !!window.__PASSWORD_AVAILABLE;
    const notConfigured = (missing && missing.length) || (!clientId && !passwordAvailable);
    const checklist = [];
    if (!clientId) checklist.push('GOOGLE_CLIENT_ID');
    if (missing && missing.indexOf('jwt') >= 0) checklist.push('JWT_SECRET');

    document.getElementById('app').innerHTML = `
      <div class="login-wrap">
        <div class="login-card">
          <h1>Command <em>Center</em></h1>
          <p>Restricted access. Sign in to view engagement analytics.</p>
          ${err ? `<div class="login-error">${err}</div>` : ''}
          ${clientId ? `<div class="login-google-holder" id="gbtn"></div>` : ''}
          ${passwordAvailable ? `
            ${clientId ? `<div class="login-or"><span>or</span></div>` : ''}
            <form id="pw-form" class="pw-form" autocomplete="off">
              <input type="password" id="pw-input" placeholder="Admin password" autocomplete="current-password" required />
              <button type="submit" class="pw-btn">Unlock</button>
            </form>
          ` : ''}
          ${!clientId && !passwordAvailable && !notConfigured ? '' : (notConfigured ? `
            <div class="login-note">
              ${checklist.length ? `Missing env vars: ${checklist.map(c => '<code>' + c + '</code>').join(', ')}.` : ''}
            </div>` : '')}
          ${clientId ? `<div class="login-note" style="margin-top:18px;opacity:0.6">If Google shows an <code>origin_mismatch</code> error, add <code>https://ashmofidi.com</code> to the OAuth client's Authorized JavaScript origins, or use the password field above.</div>` : ''}
        </div>
      </div>`;

    if (passwordAvailable) {
      const pwForm = document.getElementById('pw-form');
      const pwInput = document.getElementById('pw-input');
      pwForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const pw = pwInput.value.trim();
        if (!pw) return;
        const r = await loginWithPassword(pw);
        if (r.status === 200) location.reload();
        else renderLogin(r.body && r.body.error === 'invalid_password' ? 'Wrong password.' : 'Login failed.', missing);
      });
      setTimeout(() => pwInput.focus(), 200);
    }

    if (!clientId) return;

    function mount() {
      if (!window.google || !google.accounts) { setTimeout(mount, 120); return; }
      try {
        google.accounts.id.initialize({
          client_id: clientId,
          callback: async (resp) => {
            const r = await loginWithCredential(resp.credential);
            if (r.status === 200) { location.reload(); return; }
            let msg = 'Sign-in failed.';
            if (r.body && r.body.error === 'not_admin') msg = 'This Google account is not authorized as admin.';
            else if (r.body && r.body.error === 'auth_not_configured') msg = 'JWT_SECRET is not set in Vercel env vars.';
            else if (r.body && r.body.error === 'invalid_token') msg = 'Google rejected the token. Check that ' + location.origin + ' is in the OAuth client Authorized JavaScript origins.';
            renderLogin(msg, !r.body || r.body.error === 'auth_not_configured' ? ['jwt'] : []);
          }
        });
        google.accounts.id.renderButton(
          document.getElementById('gbtn'),
          { theme: 'outline', size: 'large', shape: 'pill', text: 'signin_with', width: 280 }
        );
      } catch (e) {
        console.error('gsi_mount_error', e);
        document.getElementById('gbtn').innerHTML = '<div class="login-error">Failed to render Google button: ' + esc(String(e.message || e)) + '</div>';
      }
    }
    mount();
  }

  function fmtNum(n) { n = Number(n) || 0; if (n >= 1e6) return (n/1e6).toFixed(1)+'M'; if (n >= 1e3) return (n/1e3).toFixed(1)+'k'; return String(n); }
  function fmtTs(ts) {
    const d = new Date(ts);
    const now = Date.now();
    const diff = Math.floor((now - ts) / 1000);
    if (diff < 60) return diff + 's ago';
    if (diff < 3600) return Math.floor(diff/60) + 'm ago';
    if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
    return d.toISOString().slice(0, 16).replace('T', ' ');
  }
  function esc(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function drawChart(svg, series) {
    const w = svg.clientWidth, h = svg.clientHeight;
    const pad = { t: 16, r: 14, b: 32, l: 44 };
    const iw = w - pad.l - pad.r, ih = h - pad.t - pad.b;
    svg.innerHTML = '';
    if (!series || !series.length) return;
    const maxVal = Math.max(1, ...series.map(d => Math.max(d.questions || 0, d.visitors || 0)));
    const step = iw / Math.max(1, series.length - 1);
    let html = '';

    for (let i = 0; i <= 4; i++) {
      const y = pad.t + ih - (ih * i / 4);
      const val = Math.round(maxVal * i / 4);
      html += '<line x1="' + pad.l + '" y1="' + y + '" x2="' + (w - pad.r) + '" y2="' + y + '" stroke="rgba(14,14,14,0.07)" />';
      html += '<text class="chart-axis-label" x="' + (pad.l - 8) + '" y="' + (y + 4) + '" text-anchor="end">' + val + '</text>';
    }

    // questions area (filled)
    let areaQ = 'M' + pad.l + ',' + (pad.t + ih) + ' ';
    series.forEach((d, i) => {
      const x = pad.l + i * step;
      const yQ = pad.t + ih - (ih * ((d.questions || 0) / maxVal));
      areaQ += 'L' + x + ',' + yQ + ' ';
    });
    areaQ += 'L' + (pad.l + (series.length - 1) * step) + ',' + (pad.t + ih) + ' Z';
    html += '<path class="chart-area-q" d="' + areaQ + '" />';

    // questions line + dots
    let pathQ = '';
    let dotsHtml = '';
    series.forEach((d, i) => {
      const x = pad.l + i * step;
      const yQ = pad.t + ih - (ih * ((d.questions || 0) / maxVal));
      pathQ += (i === 0 ? 'M' : 'L') + x + ',' + yQ + ' ';
      if ((d.questions || 0) > 0 || (d.visitors || 0) > 0) {
        dotsHtml += '<circle class="chart-dot" cx="' + x + '" cy="' + yQ + '" r="3"><title>' + d.date + ': ' + (d.questions || 0) + ' questions, ' + (d.visitors || 0) + ' visitors</title></circle>';
      }
      if (i === 0 || i === series.length - 1 || i % 6 === 0) {
        const label = d.date.slice(5);
        html += '<text class="chart-axis-label" x="' + x + '" y="' + (h - 12) + '" text-anchor="middle">' + label + '</text>';
      }
    });

    // visitors line (dashed)
    let pathV = '';
    series.forEach((d, i) => {
      const x = pad.l + i * step;
      const yV = pad.t + ih - (ih * ((d.visitors || 0) / maxVal));
      pathV += (i === 0 ? 'M' : 'L') + x + ',' + yV + ' ';
    });
    html += '<path class="chart-line-v" d="' + pathV + '" />';
    html += '<path class="chart-line-q" d="' + pathQ + '" />';
    html += dotsHtml;
    svg.innerHTML = html;
  }

  // Draw a compact sparkline for the hero stat's trend visual
  function drawSparkline(svg, data, color) {
    const w = svg.clientWidth || 200, h = svg.clientHeight || 56;
    const pad = 3;
    if (!data || !data.length) { svg.innerHTML = ''; return; }
    const max = Math.max(1, ...data);
    const step = (w - pad * 2) / Math.max(1, data.length - 1);
    let line = '', area = 'M' + pad + ',' + (h - pad) + ' ';
    data.forEach((v, i) => {
      const x = pad + i * step;
      const y = pad + (h - pad * 2) - ((h - pad * 2) * (v / max));
      line += (i === 0 ? 'M' : 'L') + x + ',' + y + ' ';
      area += 'L' + x + ',' + y + ' ';
    });
    area += 'L' + (pad + (data.length - 1) * step) + ',' + (h - pad) + ' Z';
    svg.innerHTML = '<path class="area" d="' + area + '" /><path d="' + line + '" />';
  }

  // Classify a question string into a theme label
  function classifyTheme(q) {
    const t = (q || '').toLowerCase();
    if (/patent|brandhub|uspto|classif/.test(t)) return 'the patent';
    if (/pricex|pricing|latency/.test(t)) return 'PriceX / pricing';
    if (/cross.?border|mexico|canada|kyc|sanction|fx|settlement/.test(t)) return 'cross-border';
    if (/fintech|stripe|ramp|brex|mercury/.test(t)) return 'fintech hiring';
    if (/manage|leadership|team|mentor/.test(t)) return 'management style';
    if (/fail|wrong|mistake|regret|hardest/.test(t)) return 'a failure story';
    if (/priorit|backlog|on fire/.test(t)) return 'prioritization';
    if (/weakness|flaw|bad at/.test(t)) return 'weaknesses';
    if (/strength|good at|superpower/.test(t)) return 'strengths';
    if (/leaving|looking|next role|searching/.test(t)) return 'why leaving';
    if (/walmart|wmt/.test(t)) return 'Walmart background';
    if (/radar/.test(t)) return 'current role';
    if (/night|weekend|side|becoming|command/.test(t)) return 'side projects';
    if (/different|unique|stand out|why you/.test(t)) return 'what makes him different';
    if (/stack|tools|tech/.test(t)) return 'his stack';
    if (/education|school|degree|cornell|sfsu/.test(t)) return 'education';
    if (/remote|relocat|bay area/.test(t)) return 'location/remote';
    return 'other';
  }

  // Classify a referrer URL into a source bucket
  function classifyReferrer(ref) {
    if (!ref) return 'Direct';
    const r = ref.toLowerCase();
    if (/linkedin\.com/.test(r)) return 'LinkedIn';
    if (/twitter\.com|x\.com|t\.co/.test(r)) return 'Twitter / X';
    if (/google\.com|bing\.com|duckduckgo/.test(r)) return 'Search';
    if (/facebook\.com|instagram\.com/.test(r)) return 'Meta';
    if (/github\.com/.test(r)) return 'GitHub';
    if (/maven\.com/.test(r)) return 'Maven';
    if (/news\.ycombinator/.test(r)) return 'Hacker News';
    if (/reddit\.com/.test(r)) return 'Reddit';
    try { return new URL(ref).hostname.replace(/^www\./, ''); } catch { return 'Other'; }
  }

  function buildFeed(questions, events, limit) {
    const items = [];
    (questions || []).forEach(q => {
      items.push({
        ts: q.ts,
        kind: q.refused ? 'refused' : 'ask',
        text: q.question || '',
        meta: { latency: q.latencyMs, refused: !!q.refused }
      });
    });
    (events || []).forEach(ev => {
      items.push({
        ts: ev.ts,
        kind: 'visit',
        text: '',
        meta: { path: ev.path || '/', ref: ev.ref || '' }
      });
    });
    items.sort((a, b) => (b.ts || 0) - (a.ts || 0));
    return items.slice(0, limit || 15);
  }

  function renderFeedItem(it) {
    const when = fmtTs(it.ts);
    if (it.kind === 'ask' || it.kind === 'refused') {
      const q = esc((it.text || '').slice(0, 180));
      const latency = it.meta && it.meta.latency ? ' <span class="tag">' + it.meta.latency + 'ms</span>' : '';
      const iconClass = it.kind === 'refused' ? 'refused' : 'ask';
      const iconChar = it.kind === 'refused' ? '!' : 'Q';
      const verb = it.kind === 'refused' ? 'asked off-topic' : 'asked';
      return '<div class="feed-item">'
        + '<div class="feed-time">' + when + '</div>'
        + '<div class="feed-icon ' + iconClass + '">' + iconChar + '</div>'
        + '<div class="feed-body">Someone <b>' + verb + '</b>: <i>' + q + '</i>' + latency + '</div>'
        + '</div>';
    }
    // visit
    const src = classifyReferrer(it.meta && it.meta.ref);
    const path = esc((it.meta && it.meta.path) || '/');
    const sourceText = src === 'Direct' ? 'arrived <b>direct</b>' : 'arrived from <b>' + esc(src) + '</b>';
    return '<div class="feed-item">'
      + '<div class="feed-time">' + when + '</div>'
      + '<div class="feed-icon visit">↗</div>'
      + '<div class="feed-body">Someone ' + sourceText + ' <span class="tag">' + path + '</span></div>'
      + '</div>';
  }

  // Compute "active now": visits within the last 5 minutes
  function activeNow(events) {
    if (!events) return 0;
    const cutoff = Date.now() - 5 * 60 * 1000;
    const seen = new Set();
    (events || []).forEach(ev => {
      if (ev.ts >= cutoff && ev.ip) seen.add(ev.ip);
    });
    return seen.size;
  }

  function renderDashboard(data) {
    const series = Array.isArray(data.series) ? data.series : [];
    const questions = Array.isArray(data.questions) ? data.questions : [];
    const events = Array.isArray(data.events) ? data.events : [];
    const today = data.today || {};

    const totalAllTime = data.totalsAllTime || {};
    const totalQ = Number(totalAllTime.ask_answered || 0) + Number(totalAllTime.ask_refused || 0);
    const totalAnswered = Number(totalAllTime.ask_answered || 0);
    const totalRefused = Number(totalAllTime.ask_refused || 0);
    const refuseRate = totalQ ? Math.round((totalRefused / totalQ) * 100) : 0;
    const answerRate = totalQ ? Math.round((totalAnswered / totalQ) * 100) : 0;
    const visitors = data.visitors || {};
    const uniqueToday = Number(visitors.uniqueToday) || 0;
    const unique7d = Number(visitors.unique7d) || 0;
    const unique30d = Number(visitors.unique30d) || 0;
    const uniqueAllTime = Number(visitors.uniqueAllTime) || 0;

    // Derive week-over-week growth from daily series
    const last7 = series.slice(-7);
    const prev7 = series.slice(-14, -7);
    const visitors7Now = last7.reduce((a,d)=>a+(d.visitors||0),0);
    const visitors7Prev = prev7.reduce((a,d)=>a+(d.visitors||0),0);
    const wowDelta = visitors7Prev === 0
      ? (visitors7Now > 0 ? 100 : 0)
      : Math.round(((visitors7Now - visitors7Prev) / visitors7Prev) * 100);
    const wowClass = wowDelta > 2 ? 'up' : (wowDelta < -2 ? 'down' : 'flat');
    const wowArrow = wowDelta > 0 ? '↑' : (wowDelta < 0 ? '↓' : '·');

    // Yesterday comparison for today's uniques
    const yesterdayVisitors = series.length >= 2 ? (series[series.length - 2].visitors || 0) : 0;
    const dayDelta = uniqueToday - yesterdayVisitors;
    const dayDeltaLabel = dayDelta > 0 ? ('↑ ' + dayDelta + ' vs yesterday') : (dayDelta < 0 ? ('↓ ' + Math.abs(dayDelta) + ' vs yesterday') : 'same as yesterday');
    const dayDeltaClass = dayDelta > 0 ? 'arrow-up' : (dayDelta < 0 ? 'arrow-down' : '');

    // Top theme across all recent questions
    const themes = {};

    const themeList = Object.entries(themes).sort((a,b)=>b[1]-a[1]);

    // Referrer breakdown from events

    const refList = Object.entries(refs).sort((a,b)=>b[1]-a[1]);
    const totalRefs = refList.reduce((a,x)=>a+x[1],0) || 1;

              <path d="M35,120 L70,5 L105,120" stroke="#0e0e0e" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
              <line x1="50" y1="78" x2="90" y2="78" stroke="#0e0e0e" stroke-width="9" stroke-linecap="round"/>
            </svg>

          Ash Mofidi

        </div>

          <span class="live"><span class="live-dot"></span>Live</span>
          <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-dim)">${esc(data.admin && data.admin.email || '')}</span>
          <button class="logout-btn" onclick="logout()">Sign out</button>

                </div>`).join('')}
            </div>` : `<div class="empty">No chip clicks yet.</div>`}
          </div>
          <div class="footer-card">
            <h3>Deep-link <em>traffic</em></h3>
            ${deepData.length ? `<div class="deeplink-list">
              ${deepData.map(([k, v]) => `<div><a target="_blank" href="/?q=${esc(k)}">/?q=${esc(k)}</a><span class="count">${fmtNum(v)}</span></div>`).join('')}
            </div>` : `<div class="deeplink-list">
              <div><a target="_blank" href="/?q=biggest">/?q=biggest</a></div>
              <div><a target="_blank" href="/?q=patent">/?q=patent</a></div>
              <div><a target="_blank" href="/?q=fintech">/?q=fintech</a></div>
              <div><a target="_blank" href="/?q=nights">/?q=nights</a></div>
              <div style="margin-top:10px;color:var(--ink-faint);font-size:11px">Share these on LinkedIn posts to auto-stream the matching answer.</div>
            </div>`}
          </div>
          <div class="footer-card">
            <h3>Chat <em>health</em></h3>
            <div class="kpi-row">
              <span class="k">Answered</span>
              <span class="v green">${fmtNum(totalAnswered)}</span>
            </div>
            <div class="kpi-row">
              <span class="k">Refused</span>
              <span class="v ${totalRefused > 0 ? 'red' : ''}">${fmtNum(totalRefused)}</span>
            </div>
            <div class="kpi-row">
              <span class="k">Answer rate</span>
              <span class="v blue">${answerRate}%</span>
            </div>
            <div style="margin-top:16px;text-align:right">
              <button class="export-btn" onclick="exportCsv()">Export CSV</button>
            </div>
          </div>
        </div>

      </div>
      <footer>Auto-refreshing every 10 seconds · data retained 30 days</footer>
    `;

    const svg = document.getElementById('chart');
    if (svg) drawChart(svg, series);

    const spark = document.getElementById('hero-spark');
    if (spark) drawSparkline(spark, last7.map(d => d.visitors || 0));

    window.__lastQuestions = questions;
  }

  window.exportCsv = function() {
    const qs = window.__lastQuestions || [];
    const rows = [['timestamp','question','latency_ms','refused']];
    qs.forEach(q => rows.push([new Date(q.ts).toISOString(), q.question || '', q.latencyMs || '', q.refused ? '1' : '0']));
    const csv = rows.map(r => r.map(c => '"' + String(c).replace(/"/g,'""') + '"').join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'ashmofidi-questions-' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
  };

  window.logout = logout;

  async function loadStats() {
    try {
      const r = await fetch('/api/stats');
      if (r.status === 401) { renderLogin(); return false; }
      if (r.status === 503) {
        const body = await r.json().catch(()=>({}));
        renderLogin(null, body.error === 'auth_not_configured' ? ['jwt'] : []);
        return false;
      }
      if (!r.ok) {
        renderLogin('Stats endpoint returned ' + r.status + '. Check Vercel function logs.');
        return false;
      }
      const data = await r.json();
      renderDashboard(data);
      return true;
    } catch (e) {
      console.error('loadStats_error', e);
      renderLogin('Network error reaching /api/stats.');
      return false;
    }
  }

  async function init() {
    const cfg = await GSI_CLIENT_ID_FETCH();
    window.__GOOGLE_CLIENT_ID = (cfg.googleClientId || '').trim();
    window.__PASSWORD_AVAILABLE = Boolean(cfg.passwordAvailable);
    const ok = await loadStats();
    if (ok) setInterval(loadStats, 10000);
  }
  init();
</script>
</body>
</html>
