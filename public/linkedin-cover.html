<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>LinkedIn Cover · Ash Mofidi</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #f1ecdd;
    font-family: 'Fraunces', serif;
    color: #0e0e0e;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body { display: flex; align-items: flex-start; justify-content: flex-start; overflow: hidden; }

  /* =========================================================
     LinkedIn cover · EXACT 1584 × 396 (4:1)
     Safe zones:
       Profile photo overlay (desktop): ~x:40-260, y:240-396
       Mobile crop: ~50px top + 50px bottom, so keep core content y:60-336
     Single POV statement. Nothing else. Book-jacket restraint.
     ========================================================= */
  .cover {
    position: relative;
    width: 1584px; height: 396px;
    background: #f1ecdd;
    overflow: hidden;
  }

  /* Paper grain — gives the cream warmth */
  .cover::before {
    content: ""; position: absolute; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.7'/></svg>");
    mix-blend-mode: multiply;
    opacity: 0.08;
    pointer-events: none;
    z-index: 3;
  }

  /* Ambient cobalt wash (top-right) — the only "color" on the page outside the statement */
  .cover::after {
    content: ""; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 50% 85% at 98% 10%, rgba(0,29,217,0.10), transparent 60%),
      radial-gradient(ellipse 40% 60% at 0% 95%, rgba(14,14,14,0.05), transparent 60%);
    pointer-events: none;
    z-index: 1;
  }

  /* ---------- TOP-LEFT: Signature mark + dateline (quiet brand anchor) ---------- */
  .mark {
    position: absolute;
    top: 56px; left: 68px;
    display: flex; align-items: center; gap: 14px;
    z-index: 5;
  }
  .mark-logo {
    width: 44px; height: 44px; border-radius: 10px;
    background: #0e0e0e; padding: 6px 7px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 24px -10px rgba(14,14,14,0.35);
  }
  .mark-logo svg { width: 100%; height: 100%; display: block; }
  .mark-sig {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 21px;
    color: #272727;
    letter-spacing: -0.01em;
    line-height: 1;
  }
  .mark-sig strong {
    color: #0e0e0e;
    font-weight: 500;
    font-style: italic;
  }

  /* ---------- CENTER: The credo. Two lines, huge italic Fraunces ----------
     Anchored right of the profile-photo zone. Vertically centered. */
  .credo {
    position: absolute;
    top: 50%;
    left: 360px;
    right: 68px;
    transform: translateY(-50%);
    z-index: 4;
  }
  .line-1, .line-2 {
    font-family: 'Fraunces', 'Times New Roman', serif;
    font-weight: 300;
    font-style: italic;
    font-size: 96px;
    line-height: 0.96;
    letter-spacing: -0.04em;
    font-variation-settings: "opsz" 144;
    display: block;
    white-space: nowrap;
  }
  .line-1 {
    color: #0e0e0e;
    margin-bottom: 4px;
  }
  .line-2 {
    color: #001dd9;
    position: relative;
    display: inline-block;
  }
  .line-2::after {
    content: "";
    position: absolute;
    left: 0; right: 0;
    bottom: 0.1em; height: 3px;
    background: #001dd9;
    opacity: 0.32;
  }

  /* ---------- BOTTOM-RIGHT: URL anchor. Plenty of breathing room. ---------- */
  .tag {
    position: absolute;
    bottom: 48px; right: 68px;
    z-index: 10;
    font-family: 'JetBrains Mono', monospace;
    font-size: 17px; letter-spacing: 0.18em;
    color: #0e0e0e; text-transform: uppercase;
    font-weight: 600;
    line-height: 1;
    white-space: nowrap;
    padding-left: 44px;
    display: block;
  }
  .tag::before {
    content: "";
    position: absolute;
    left: 0;
    top: 9px;
    width: 30px; height: 1.5px;
    background: #001dd9;
  }
</style>
</head>
<body>
<div class="cover">

  <div class="mark">
    <span class="mark-logo" aria-hidden="true">
      <svg viewBox="0 0 140 140" fill="none">
        <path d="M20,120 L20,15 L52,78" stroke="#A8243B" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M88,78 L120,15 L120,120" stroke="#1B7A42" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M35,120 L70,5 L105,120" stroke="#FFFFFF" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="50" y1="78" x2="90" y2="78" stroke="#FFFFFF" stroke-width="13" stroke-linecap="round"/>
      </svg>
    </span>
  </div>

  <div class="credo">
    <span class="line-1">I don't ship features.</span>
    <span class="line-2">I ship platforms.</span>
  </div>


</div>

<script>
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(() => {
      document.body.setAttribute('data-fonts-loaded', 'true');
    });
  }
</script>
</body>
</html>
