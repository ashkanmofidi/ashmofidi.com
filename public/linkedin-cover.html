<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>LinkedIn Cover · Ash Mofidi</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400;1,9..144,500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #f1ecdd;
    font-family: 'Inter', sans-serif;
    color: #0e0e0e;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body { display: flex; align-items: flex-start; justify-content: flex-start; }

  /* =========================================================
     LINKEDIN COVER, EXACT 1584 × 396 px, 4:1 aspect ratio
     Safe zones respected:
       · Desktop profile photo overlay: x:60-300, y:280-396 (LEFT ALONE)
       · Mobile top/bottom crop: keep critical text within y:60-336
     ========================================================= */
  .cover {
    position: relative;
    width: 1584px; height: 396px;
    background: #f1ecdd;
    overflow: hidden;
  }

  /* Paper grain */
  .cover::before {
    content: ""; position: absolute; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.7'/></svg>");
    mix-blend-mode: multiply;
    opacity: 0.09;
    pointer-events: none;
    z-index: 2;
  }

  /* Ambient cobalt wash in top-right; black-tint bottom-left (richer feel) */
  .cover::after {
    content: ""; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 55% 80% at 95% 15%, rgba(0,29,217,0.09), transparent 60%),
      radial-gradient(ellipse 30% 60% at 5% 85%, rgba(14,14,14,0.05), transparent 60%);
    pointer-events: none;
    z-index: 1;
  }

  /* Thin horizontal rules (editorial framing) */
  .rule-top, .rule-bottom {
    position: absolute;
    height: 1px;
    z-index: 3;
  }
  .rule-top {
    top: 50px; left: 68px; right: 68px;
    background: linear-gradient(to right, transparent, rgba(14,14,14,0.22) 15%, rgba(14,14,14,0.22) 85%, transparent);
  }
  .rule-bottom {
    bottom: 50px; left: 68px; right: 68px;
    background: linear-gradient(to right, transparent, rgba(14,14,14,0.22) 15%, rgba(14,14,14,0.22) 85%, transparent);
  }

  /* ---------- TOP-LEFT: AM logo + name badge ---------- */
  .brand {
    position: absolute; top: 60px; left: 68px;
    display: flex; align-items: center; gap: 16px;
    z-index: 5;
  }
  .brand-logo {
    width: 56px; height: 56px; border-radius: 12px;
    background: #0e0e0e; padding: 8px 9px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 24px -10px rgba(14,14,14,0.35);
  }
  .brand-logo svg { width: 100%; height: 100%; display: block; }
  .brand-name {
    font-family: 'Fraunces', serif; font-weight: 500;
    font-size: 28px; letter-spacing: -0.02em;
    color: #0e0e0e; line-height: 1;
  }
  .brand-name em {
    font-style: italic; font-weight: 400;
    color: #001dd9;
  }

  /* ---------- TOP-RIGHT: title + location + live signal ---------- */
  .meta-tr {
    position: absolute; top: 76px; right: 68px;
    display: flex; align-items: center; gap: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; letter-spacing: 0.14em;
    color: #272727; text-transform: uppercase;
    font-weight: 500;
    z-index: 5;
    line-height: 1;
  }
  .meta-tr .live-dot {
    display: inline-block; width: 9px; height: 9px; border-radius: 50%;
    background: #3fae6a; box-shadow: 0 0 8px rgba(63,174,106,0.7);
    vertical-align: -1px; margin-right: 2px;
  }
  .meta-tr .sep { color: #969696; font-weight: 400; }

  /* ---------- CENTER: the statement ----------
     Anchored to the right, safely clear of the profile-photo zone.
     Font tuned to fit two lines + URL cleanly within 396px. */
  .statement {
    position: absolute;
    top: 158px;
    left: 360px;
    right: 68px;
    z-index: 4;
    line-height: 1;
  }
  .line-1, .line-2 {
    font-family: 'Fraunces', 'Times New Roman', serif;
    font-weight: 300;
    font-size: 84px;
    line-height: 0.96;
    letter-spacing: -0.042em;
    font-variation-settings: "opsz" 144;
    display: block;
    padding: 0;
    white-space: nowrap;
  }
  .line-1 {
    color: #0e0e0e;
    font-style: italic;
  }
  .line-2 {
    color: #001dd9;
    font-style: italic;
    position: relative;
    display: inline-block;
    margin-top: 2px;
  }
  .line-2::after {
    content: "";
    position: absolute;
    left: 0; right: 0;
    bottom: 0.12em; height: 3px;
    background: #001dd9;
    opacity: 0.28;
  }

  /* ---------- BOTTOM-RIGHT: url ---------- */
  .url {
    position: absolute;
    bottom: 60px; right: 68px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 17px; letter-spacing: 0.14em;
    color: #0e0e0e; text-transform: uppercase;
    font-weight: 600;
    z-index: 5;
    display: flex; align-items: center; gap: 14px;
    line-height: 1;
  }
  .url::before {
    content: ""; display: inline-block;
    width: 30px; height: 1px; background: #001dd9;
  }
</style>
</head>
<body>
<div class="cover">
  <div class="rule-top"></div>
  <div class="rule-bottom"></div>

  <div class="brand">
    <span class="brand-logo" aria-hidden="true">
      <svg viewBox="0 0 140 140" fill="none">
        <path d="M20,120 L20,15 L52,78" stroke="#A8243B" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M88,78 L120,15 L120,120" stroke="#1B7A42" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M35,120 L70,5 L105,120" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="50" y1="78" x2="90" y2="78" stroke="#FFFFFF" stroke-width="11" stroke-linecap="round"/>
      </svg>
    </span>
    <span class="brand-name">Ash <em>Mofidi</em></span>
  </div>

  <div class="meta-tr">
    <span>Staff AI Product Manager</span>
    <span class="sep">·</span>
    <span>Silicon Valley</span>
    <span class="sep">·</span>
    <span><span class="live-dot"></span>&nbsp;Open to roles</span>
  </div>

  <div class="statement">
    <span class="line-1">Ten years.</span>
    <span class="line-2">Three zero-to-one.</span>
  </div>

  <div class="url">ashmofidi.com</div>
</div>

<script>
  // Signal to headless renderer when fonts finish loading
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(() => {
      document.body.setAttribute('data-fonts-loaded', 'true');
    });
  }
</script>
</body>
</html>
